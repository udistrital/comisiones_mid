basePath: /v1
paths:
  /solicitud/:
    get:
      tags:
      - solicitud
      description: get Solicitud
      operationId: SolicitudController.GetAll
      parameters:
      - in: query
        name: query
        description: Filter. e.g. col1:v1,col2:v2 ...
        type: string
      - in: query
        name: fields
        description: Fields returned. e.g. col1,col2 ...
        type: string
      - in: query
        name: sortby
        description: Sorted-by fields. e.g. col1,col2 ...
        type: string
      - in: query
        name: order
        description: Order corresponding to each sortby field, if single value, apply to all sortby fields. e.g. desc,asc ...
        type: string
      - in: query
        name: limit
        description: Limit the size of result set. Must be an integer
        type: string
      - in: query
        name: offset
        description: Start position of result set. Must be an integer
        type: string
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: ""
    post:
      tags:
      - solicitud
      description: create Solicitud
      operationId: SolicitudController.Create
      parameters:
      - in: body
        name: body
        description: body for Solicitud content
        required: true
        schema:
          $ref: '#/definitions/models.Solicitud'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: body is empty
  /solicitud/{id}:
    get:
      tags:
      - solicitud
      description: get Solicitud by id
      operationId: SolicitudController.GetOne
      parameters:
      - in: path
        name: id
        description: The key for staticblock
        required: true
        type: string
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: :id is empty
    put:
      tags:
      - solicitud
      description: update the Solicitud
      operationId: SolicitudController.Put
      parameters:
      - in: path
        name: id
        description: The id you want to update
        required: true
        type: string
      - in: body
        name: body
        description: body for Solicitud content
        required: true
        schema:
          $ref: '#/definitions/models.Solicitud'
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: :id is not int
    delete:
      tags:
      - solicitud
      description: delete the Solicitud
      operationId: SolicitudController.Delete
      parameters:
      - in: path
        name: id
        description: The id you want to delete
        required: true
        type: string
      responses:
        "200":
          description: '{string} delete success!'
        "403":
          description: id is empty
  /solicitud/crear_solicitud:
    post:
      tags:
      - solicitud
      description: create Solicitud
      operationId: SolicitudController.Create
      parameters:
      - in: body
        name: body
        description: body for Solicitud content
        required: true
        schema:
          $ref: '#/definitions/models.Solicitud'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: body is empty
  /solicitud/estados:
    post:
      tags:
      - solicitud
      description: Desactiva el histórico vigente (Activo=false) y crea un nuevo histórico con estado destino
      operationId: SolicitudController.Crear estado de solicitud
      parameters:
      - in: body
        name: body
        description: Body con SolicitudId + codigos + NumeroIdentificacion
        required: true
        schema:
          $ref: '#/definitions/map[string]interface{}'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/map[string]interface{}'
        "400":
          description: bad request
  /solicitud/pendientes_coordinador/{numero_identificacion}:
    get:
      tags:
      - solicitud
      description: Retorna las solicitudes pendientes por revisar de un coordinador según su número de identificación
      operationId: SolicitudPendienteCoordinadorController.Get Solicitudes Pendientes Coordinador
      parameters:
      - in: path
        name: numero_identificacion
        description: Número de identificación del coordinador
        required: true
        type: string
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/map[string]interface{}'
        "400":
          description: '{object} map[string]interface{}'
  /solicitud/pendientes_secretaria/{numero_identificacion}:
    get:
      tags:
      - solicitud
      description: Retorna las solicitudes pendientes por revisar de la secretaria academica según su número de identificación
      operationId: SolicitudPendienteSecretariaController.Get Solicitudes Pendientes Secretaria
      parameters:
      - in: path
        name: numero_identificacion
        description: Número de identificación del secretario(a)
        required: true
        type: string
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/map[string]interface{}'
        "400":
          description: '{object} map[string]interface{}'
  /solicitud/prueba_documento:
    post:
      tags:
      - solicitud
      description: prueba creación documento
      operationId: SolicitudController.Test Documento
      responses:
        "200":
          description: ""
          schema:
            $ref: '#/definitions/map[string]interface{}'
  /solicitud/solicitudes_by_identificacion/{id}:
    get:
      tags:
      - solicitud
      description: search Solicitud
      operationId: SolicitudController.Create
      parameters:
      - in: body
        name: body
        description: body for Solicitud content
        required: true
        schema:
          $ref: '#/definitions/models.Solicitud'
      responses:
        "201":
          description: ""
          schema:
            $ref: '#/definitions/models.Solicitud'
        "403":
          description: body is empty
definitions:
  map[string]interface{}:
