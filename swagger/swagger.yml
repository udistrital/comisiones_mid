      Descripcion:
        type: string
      FechaCreacion:
        type: string
      FechaModificacion:
        type: string
      Id:
        type: integer
        format: int64
  models.Solicitud:
    title: Solicitud
    type: object
    properties:
      Activo:
        type: boolean
      ComisionId:
        $ref: '#/definitions/models.Comision'
      FechaCreacion:
        type: string
      FechaModificacion:
        type: string
      Id:
        type: integer
        format: int64
      ObservacionCierre:
        type: string
      TerceroId:
        type: integer
